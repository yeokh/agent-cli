# -----------------------------------------------------------------------
# Per-job PVC template
#
# Copy this file and replace JOB_ID (e.g. job-001) before applying:
#   sed 's/JOB_ID/job-001/g' deployment/claude-agent-job-pvc-template.yaml \
#     | oc apply -f -
# -----------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-JOB_ID-input-pvc
  labels:
    app: claude-agent
    job-id: JOB_ID
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-JOB_ID-output-pvc
  labels:
    app: claude-agent
    job-id: JOB_ID
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
