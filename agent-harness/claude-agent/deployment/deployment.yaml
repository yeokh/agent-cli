apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-agent
  labels:
    app: claude-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-agent
  template:
    metadata:
      labels:
        app: claude-agent
    spec:
      containers:
        - name: claude-agent
          image: quay.io/khyeo/claude-agent:v1
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: claude-agent-api-keys
          env:
            - name: RUN_MODE
              value: "web"
            - name: API_PROVIDER
              value: "anthropic"
            - name: MODEL
              value: "claude-opus-4-5"
            - name: MAX_TURNS
              value: "50"
            - name: MAX_OUTPUT_TOKENS
              value: "16384"
            - name: ALLOW_SHELL
              value: "true"
            - name: SHELL_TIMEOUT
              value: "60"
          volumeMounts:
            - name: agent-volume
              mountPath: /app/agent
            - name: input-volume
              mountPath: /app/input
            - name: output-volume
              mountPath: /app/output
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: agent-volume
          persistentVolumeClaim:
            claimName: claude-agent-agent-pvc
        - name: input-volume
          persistentVolumeClaim:
            claimName: claude-agent-input-pvc
        - name: output-volume
          persistentVolumeClaim:
            claimName: claude-agent-output-pvc
