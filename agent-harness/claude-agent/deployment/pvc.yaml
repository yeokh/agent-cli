apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-agent-agent-pvc
  labels:
    app: claude-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-agent-input-pvc
  labels:
    app: claude-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-agent-output-pvc
  labels:
    app: claude-agent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
