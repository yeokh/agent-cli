# ============================================================
# Playbook: Install IIS and deploy placeholder corporate website
# Request ID: PB-2026-004
# Generated for: win-web-01, win-web-02
# OS: Windows Server 2019 Standard
# Requested by: Daniel Osei on 2026-06-20
# ============================================================

# Expected inventory entries:
# [web_servers]
# win-web-01 ansible_host=10.10.9.51
# win-web-02 ansible_host=10.10.9.52

---
- name: Install IIS and deploy placeholder corporate website
  hosts: web_servers
  become: false

  vars:
    ansible_connection: winrm
    ansible_user: ansible_svc
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_port: 5985
    iis_site_path: C:\inetpub\sites\corpsite

  tasks:
    - name: Install IIS Web Server role and required features
      ansible.windows.win_feature:
        name:
          - Web-Server
          - Web-Static-Content
          - Web-Default-Doc
          - Web-Http-Logging
          - Web-Request-Monitor
          - Web-Filtering
          - Web-Stat-Compression
        state: present
        include_management_tools: true
      register: iis_install

    - name: Reboot if IIS installation required it
      ansible.windows.win_reboot:
        msg: "IIS installation requires reboot"
        pre_reboot_delay: 15
      when: iis_install.reboot_required

    - name: Ensure W3SVC service is started and enabled
      ansible.windows.win_service:
        name: W3SVC
        state: started
        startup_type: auto

    - name: Create website content directory
      ansible.windows.win_file:
        path: "{{ iis_site_path }}"
        state: directory

    - name: Create placeholder index.html
      ansible.windows.win_copy:
        dest: "{{ iis_site_path }}\index.html"
        content: |
          <!DOCTYPE html>
          <html>
          <head>
              <title>Corporate Portal</title>
          </head>
          <body>
              <h1>Site coming soon.</h1>
          </body>
          </html>

    - name: Create CorpSitePool application pool
      community.windows.win_iis_webapppool:
        name: CorpSitePool
        state: present
        managed_runtime_version: ""
        pipeline_mode: Integrated
        attributes:
          managedRuntimeVersion: ""

    - name: Start CorpSitePool application pool
      community.windows.win_iis_webapppool:
        name: CorpSitePool
        state: started

    - name: Stop default IIS website to avoid port 80 conflict
      community.windows.win_iis_website:
        name: "Default Web Site"
        state: stopped

    - name: Create CorpSite IIS website
      community.windows.win_iis_website:
        name: CorpSite
        state: present
        physical_path: "{{ iis_site_path }}"
        application_pool: CorpSitePool
        port: 80
        host_header: corpsite.example.com
        bindings:
          - protocol: http
            port: 80
            host_header: corpsite.example.com

    - name: Start CorpSite website
      community.windows.win_iis_website:
        name: CorpSite
        state: started

    - name: Add Windows Firewall inbound rule for HTTP
      ansible.windows.win_firewall_rule:
        name: Allow HTTP
        direction: in
        action: allow
        protocol: tcp
        local_port: 80
        state: present
        enabled: true

    - name: Verify IIS service is running
      ansible.windows.win_service_info:
        name: W3SVC
      register: w3svc_status

    - name: Display IIS service status
      ansible.builtin.debug:
        msg: "W3SVC service state: {{ w3svc_status.services[0].state }}"

    - name: Verify website directory exists
      ansible.windows.win_stat:
        path: "{{ iis_site_path }}"
      register: site_path_stat

    - name: Display website directory verification
      ansible.builtin.debug:
        msg: "Website directory exists: {{ site_path_stat.stat.exists }}"

    - name: Verify index.html exists
      ansible.windows.win_stat:
        path: "{{ iis_site_path }}\index.html"
      register: index_file_stat

    - name: Display index.html verification
      ansible.builtin.debug:
        msg: "Placeholder index.html exists: {{ index_file_stat.stat.exists }}"
