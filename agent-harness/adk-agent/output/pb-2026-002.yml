# ============================================================
# Playbook: Create application service account and configure limited sudo access
# Request ID: PB-2026-002
# Generated for: db-prod-01, db-prod-02, db-prod-03
# OS: Red Hat Enterprise Linux 8.9
# Requested by: Marcus Webb on 2026-06-20
# ============================================================

# Expected inventory entries:
# [db_servers]
# db-prod-01 ansible_host=192.168.20.10
# db-prod-02 ansible_host=192.168.20.11
# db-prod-03 ansible_host=192.168.20.12

---
- name: Create application service account and configure limited sudo access
  hosts: db_servers
  become: true
  become_method: sudo

  vars:
    ansible_connection: ssh
    ansible_user: ansible
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

  tasks:
    - name: Create appgroup system group
      ansible.builtin.group:
        name: appgroup
        gid: 1500
        system: true
        state: present

    - name: Create appuser system user account
      ansible.builtin.user:
        name: appuser
        uid: 1500
        group: appgroup
        home: /opt/appuser
        shell: /bin/bash
        password: '!'
        system: true
        state: present

    - name: Set home directory permissions
      ansible.builtin.file:
        path: /opt/appuser
        owner: appuser
        group: appgroup
        mode: '0700'
        state: directory

    - name: Deploy SSH public key for appuser
      ansible.posix.authorized_key:
        user: appuser
        state: present
        key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC7vX... appuser@controller"

    - name: Create sudoers entry for appuser limited commands
      community.general.sudoers:
        name: appuser-app-commands
        user: appuser
        commands:
          - /opt/app/bin/start.sh
          - /opt/app/bin/stop.sh
        nopasswd: true
        validate: true
        state: present

    - name: Verify appuser account exists
      ansible.builtin.command:
        cmd: id appuser
      register: appuser_check
      changed_when: false

    - name: Display appuser verification
      ansible.builtin.debug:
        msg: "appuser account verified: {{ appuser_check.stdout }}"

    - name: Verify SSH public key is authorized
      ansible.builtin.shell:
        cmd: grep -c "appuser@controller" /opt/appuser/.ssh/authorized_keys || echo "0"
      register: ssh_key_check
      changed_when: false

    - name: Display SSH key verification
      ansible.builtin.debug:
        msg: "SSH public key authorized: {{ ssh_key_check.stdout | int > 0 }}"

    - name: Verify sudoers entry is configured
      ansible.builtin.command:
        cmd: sudo -l -U appuser
      register: sudoers_check
      changed_when: false

    - name: Display sudoers verification
      ansible.builtin.debug:
        msg: "Sudoers configuration verified"
        verbosity: 1
